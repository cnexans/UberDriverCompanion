name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version info
        id: version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

      - name: Build signed release APK & AAB
        working-directory: android
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PversionName=${{ steps.version.outputs.VERSION_NAME }} \
            -PversionCode=${{ steps.version.outputs.VERSION_CODE }} \
            -PKEYSTORE_FILE=../release.keystore \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Rename artifacts
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/panauber-v${{ steps.version.outputs.VERSION_NAME }}.apk
          mv android/app/build/outputs/bundle/release/app-release.aab \
             android/app/build/outputs/bundle/release/panauber-v${{ steps.version.outputs.VERSION_NAME }}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: panauber-apk-v${{ steps.version.outputs.VERSION_NAME }}
          path: android/app/build/outputs/apk/release/panauber-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: panauber-aab-v${{ steps.version.outputs.VERSION_NAME }}
          path: android/app/build/outputs/bundle/release/panauber-v${{ steps.version.outputs.VERSION_NAME }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/panauber-v${{ steps.version.outputs.VERSION_NAME }}.apk
            android/app/build/outputs/bundle/release/panauber-v${{ steps.version.outputs.VERSION_NAME }}.aab

      - name: Upload AAB to Google Play (Internal + Closed Testing)
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          pip install google-auth google-api-python-client -q
          python3 - "${{ steps.version.outputs.VERSION_NAME }}" <<'PYEOF'
          import sys, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          version_name = sys.argv[1]
          creds = service_account.Credentials.from_service_account_file(
              '/tmp/sa.json',
              scopes=['https://www.googleapis.com/auth/androidpublisher']
          )
          service = build('androidpublisher', 'v3', credentials=creds)
          pkg = 'com.carlos.uberanalyzer'

          # Create a single edit
          edit = service.edits().insert(body={}, packageName=pkg).execute()
          edit_id = edit['id']
          print(f'Created edit: {edit_id}')

          # Upload AAB
          aab_path = f'android/app/build/outputs/bundle/release/panauber-v{version_name}.aab'
          media = MediaFileUpload(aab_path, mimetype='application/octet-stream')
          bundle = service.edits().bundles().upload(
              packageName=pkg, editId=edit_id, media_body=media
          ).execute()
          vc = bundle['versionCode']
          print(f'Uploaded bundle with versionCode: {vc}')

          release = {'name': version_name, 'versionCodes': [str(vc)], 'status': 'draft'}

          # Assign to internal track
          service.edits().tracks().update(
              packageName=pkg, editId=edit_id, track='internal',
              body={'track': 'internal', 'releases': [release]}
          ).execute()
          print('Set internal track')

          # Assign to alpha (closed testing) track
          service.edits().tracks().update(
              packageName=pkg, editId=edit_id, track='alpha',
              body={'track': 'alpha', 'releases': [release]}
          ).execute()
          print('Set alpha track')

          # Commit single edit
          service.edits().commit(packageName=pkg, editId=edit_id).execute()
          print(f'Committed edit - v{version_name} (vc={vc}) on internal + alpha')
          PYEOF
          rm -f /tmp/sa.json
