name: Build & Release APK

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version info
        id: version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug -PversionName=${{ steps.version.outputs.VERSION_NAME }} -PversionCode=${{ steps.version.outputs.VERSION_CODE }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/panauber-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: panauber-v${{ steps.version.outputs.VERSION_NAME }}
          path: android/app/build/outputs/apk/debug/panauber-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/panauber-v${{ steps.version.outputs.VERSION_NAME }}.apk
